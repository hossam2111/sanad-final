services:
  - type: web
    name: sanad-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: "corepack enable && corepack prepare pnpm@latest --activate && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    healthCheckPath: /api/livez
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
