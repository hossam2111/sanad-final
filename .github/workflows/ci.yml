name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
             version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build lib/db declarations
        run: npx tsc -b lib/db/tsconfig.json

      - name: Typecheck api-server
        run: pnpm --filter @workspace/api-server typecheck

      - name: Run unit tests
        run: pnpm --filter @workspace/api-server test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: sanad-api:${{ github.sha }}
